name: Ručno generiranje s vijestima

on:
  workflow_dispatch:
    inputs:
      news:
        description: 'Vijesti za danas (jedna po retku ili odvoji sa | )'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaliraj
        run: pip install -r requirements.txt

      - name: Generiraj
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONTENT_NEWS: ${{ github.event.inputs.news }}
        run: python scripts/generate.py

      - name: Commit
        run: |
          git config user.name "VSS Digital Bot"
          git config user.email "bot@vssdigital.online"
          git add content/pending/
          git diff --staged --quiet || (git commit -m "📝 Ručno generirano $(date +%Y-%m-%d)" && git push)
