name: Dnevna objava

on:
  schedule:
    # Svaki dan u 12:00 (UTC 10:00)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaliraj dependencies
        run: pip install -r requirements.txt

      - name: Objavi na platforme
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: python scripts/post.py

      - name: Commitaj arhivu
        run: |
          git config user.name "VSS Digital Bot"
          git config user.email "bot@vssdigital.online"
          git add content/posted/ content/approved/
          git diff --staged --quiet && echo "Nista za objaviti" || \
            (git commit -m "📤 Objava objavljena $(date +%Y-%m-%d)" && git push)
